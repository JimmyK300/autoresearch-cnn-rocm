model:
  in_channels: 1
  conv_channels: [32, 32]
  kernel_sizes: [5, 5]
  paddings: [2, 1]
  hidden_dims: [128, 32]
  num_classes: 10

training:
  batch_size: 64
  learning_rate: 0.0008
  epochs: 7
  seed: 42

data:
  samples_dir: samples

artifacts:
  results_dir: results
  best_run_path: best_run.json
  research_log_path: research_log.md
